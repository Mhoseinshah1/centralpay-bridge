# CentralPay Bridge production deployment.
#
# Secrets live outside the repository in /etc/centralpay-bridge/centralpay.env
# (created by install.sh with mode 0600). Nothing in this file contains
# credentials. Only Caddy publishes host ports; the API and PostgreSQL are
# reachable exclusively on the internal network.

name: centralpay-bridge

x-app-image: &app-image
  build:
    context: .
    dockerfile: Dockerfile
  image: centralpay-bridge:latest

x-app-env: &app-env
  env_file:
    - path: ${CENTRALPAY_ENV_FILE:-/etc/centralpay-bridge/centralpay.env}
      required: false

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

# Shared hardening for the application services (same profile the admin-bot
# service has run since Phase 4): immutable root filesystem with a tmpfs for
# the heartbeat/temp files, no Linux capabilities, no privilege escalation.
# The db and caddy services keep their vendor defaults where required
# (PostgreSQL needs setuid/chown capabilities, Caddy binds 80/443 and writes
# its certificate volumes) but still run with no-new-privileges.
x-app-hardening: &app-hardening
  read_only: true
  tmpfs:
    - /tmp:size=16m
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: centralpay
      POSTGRES_USER: centralpay
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    # No published ports: PostgreSQL is never publicly reachable, and it is
    # NOT on the edge network — a compromised Caddy cannot reach it.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U centralpay -d centralpay"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    shm_size: 128mb
    logging: *default-logging

  migrate:
    <<: [*app-image, *app-env, *app-hardening]
    command: ["alembic", "upgrade", "head"]
    # Least privilege: migrations need DATABASE_URL only (alembic/env.py
    # reads nothing else). Every other application, CentralPay, bot,
    # callback, inbound and Telegram credential is masked (environment:
    # entries override env_file values) with fixed non-secret placeholders
    # where a syntactically valid value is required.
    environment:
      CENTRALPAY_GETLINK_API_KEY: not-used-by-migrate
      CENTRALPAY_VERIFY_API_KEY: not-used-by-migrate
      CENTRALPAY_PAYER_ID_SECRET: not-used-by-migrate
      INBOUND_API_KEY: not-used-by-migrate-x
      CALLBACK_HMAC_SECRET: not-used-by-migrate-x
      BOT_NOTIFY_TOKEN: ""
      ADMIN_BOT_TOKEN: ""
      ADMIN_TELEGRAM_IDS: ""
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      disable: true
    logging: *default-logging

  api:
    <<: [*app-image, *app-env, *app-hardening]
    # Least privilege: the API validates inbound requests and talks to
    # CentralPay, so it keeps DATABASE_URL, INBOUND_API_KEY,
    # CALLBACK_HMAC_SECRET and the CentralPay keys. It only queues bot
    # notifications and creates admin-alert rows — it never sends to the
    # customer bot or Telegram — so those delivery credentials are masked
    # (environment: entries override env_file values; the ADMIN_BOT_*
    # feature flags still arrive from the env file).
    environment:
      BOT_NOTIFY_TOKEN: ""
      ADMIN_BOT_TOKEN: ""
      ADMIN_TELEGRAM_IDS: ""
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      # API never starts on an unmigrated or failed-migration database.
      migrate:
        condition: service_completed_successfully
    networks:
      # edge: reachable from Caddy. internal: reaches PostgreSQL. The API is
      # the only service on both.
      - edge
      - internal
    # No published ports: only Caddy reaches the API.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging

  worker:
    <<: [*app-image, *app-env, *app-hardening]
    command: ["python", "-m", "app.worker"]
    # Least privilege: the worker delivers bot notifications and reads the
    # database; it never talks to CentralPay, never validates inbound
    # requests, and never talks to Telegram (it only creates admin-alert
    # rows), so those secrets are masked with placeholders (environment:
    # entries override env_file values). It keeps DATABASE_URL and the
    # BOT_NOTIFY_* configuration.
    environment:
      CENTRALPAY_GETLINK_API_KEY: not-used-by-worker
      CENTRALPAY_VERIFY_API_KEY: not-used-by-worker
      CENTRALPAY_PAYER_ID_SECRET: not-used-by-worker
      INBOUND_API_KEY: not-used-by-worker-x
      CALLBACK_HMAC_SECRET: not-used-by-worker-x
      ADMIN_BOT_TOKEN: ""
      ADMIN_TELEGRAM_IDS: ""
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    healthcheck:
      # Liveness: the worker touches this file after every completed pass.
      test:
        - CMD
        - python
        - -c
        - |
          import os, sys, time
          path = os.environ.get("WORKER_HEARTBEAT_FILE", "/tmp/centralpay-worker-heartbeat")
          fresh = os.path.exists(path) and time.time() - os.path.getmtime(path) < 120
          sys.exit(0 if fresh else 1)
      interval: 30s
      timeout: 5s
      retries: 4
      start_period: 30s
    logging: *default-logging

  admin-bot:
    <<: [*app-image, *app-env]
    command: ["python", "-m", "app.adminbot"]
    # Least privilege: the admin bot never talks to CentralPay or the sales
    # bot, so those secrets are masked with placeholders (environment:
    # entries override env_file values). It keeps only DATABASE_URL and its
    # own ADMIN_BOT_* configuration.
    environment:
      CENTRALPAY_GETLINK_API_KEY: not-used-by-admin-bot
      CENTRALPAY_VERIFY_API_KEY: not-used-by-admin-bot
      CENTRALPAY_PAYER_ID_SECRET: not-used-by-admin-bot
      BOT_NOTIFY_TOKEN: ""
      INBOUND_API_KEY: not-used-by-admin-bot-x
      CALLBACK_HMAC_SECRET: not-used-by-admin-bot-x
    # Only started when the admin-bot profile is enabled (the centralpay
    # command adds --profile admin-bot when ADMIN_BOT_ENABLED=true).
    profiles: ["admin-bot"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    # No published ports; outbound Telegram only. Hardened: read-only root
    # filesystem, tmpfs for the heartbeat file, no capabilities, no
    # privilege escalation, no Docker socket, non-root user from the image.
    read_only: true
    tmpfs:
      - /tmp:size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import os, sys, time
          path = os.environ.get("ADMIN_BOT_HEARTBEAT_FILE", "/tmp/centralpay-adminbot-heartbeat")
          fresh = os.path.exists(path) and time.time() - os.path.getmtime(path) < 180
          sys.exit(0 if fresh else 1)
      interval: 30s
      timeout: 5s
      retries: 4
      start_period: 45s
    logging: *default-logging

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ${CENTRALPAY_CADDYFILE:-/etc/centralpay-bridge/Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      # Edge only: Caddy reaches the API and nothing else — it has no route
      # to PostgreSQL and receives no application or database secrets.
      - edge
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

networks:
  # Public-facing hop: Caddy <-> API only.
  edge:
    driver: bridge
  # Application plane: API/worker/migrate/admin-bot <-> PostgreSQL.
  internal:
    driver: bridge

volumes:
  db_data:
  caddy_data:
  caddy_config:

secrets:
  db_password:
    file: ${CENTRALPAY_DB_PASSWORD_FILE:-/etc/centralpay-bridge/db_password}
