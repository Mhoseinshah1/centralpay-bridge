name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Tests (Python, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: centralpay
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: centralpay_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U centralpay"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # The backup/restore integration tests need client tools whose major
      # version matches the postgres:16 service (pg_dump aborts on servers
      # newer than itself; ubuntu-22.04 runners default to client 14, and
      # their stock apt sources have no postgresql-client-16 — add the PGDG
      # repository in that case).
      - name: Install PostgreSQL 16 client tools
        run: |
          sudo apt-get update
          if ! apt-cache show postgresql-client-16 >/dev/null 2>&1; then
            sudo install -d /usr/share/postgresql-common/pgdg
            sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
              https://www.postgresql.org/media/keys/ACCC4CF8.asc
            echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
              | sudo tee /etc/apt/sources.list.d/pgdg.list
            sudo apt-get update
          fi
          sudo apt-get install -y --no-install-recommends postgresql-client-16
          /usr/lib/postgresql/16/bin/pg_dump --version
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: mypy
        run: mypy app tests
      - name: pytest (unit + PostgreSQL integration)
        env:
          TEST_DATABASE_URL: postgresql+psycopg://centralpay:ci_test_password@localhost:5432/centralpay_test
        run: pytest -q

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: |
          bash -n install.sh
          bash -n scripts/centralpay
          bash -n scripts/backup.sh
      - name: ShellCheck
        run: shellcheck install.sh scripts/centralpay scripts/backup.sh

  docker:
    name: Docker build and compose validation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: |
          mkdir -p /tmp/cfg
          echo dummy > /tmp/cfg/db_password
          touch /tmp/cfg/centralpay.env /tmp/cfg/Caddyfile
          CENTRALPAY_ENV_FILE=/tmp/cfg/centralpay.env \
          CENTRALPAY_DB_PASSWORD_FILE=/tmp/cfg/db_password \
          CENTRALPAY_CADDYFILE=/tmp/cfg/Caddyfile \
            docker compose config --quiet
      - uses: docker/setup-buildx-action@v3
      - name: Resolve APP_VERSION
        id: appver
        run: echo "value=$(python3 -c 'from app.version import APP_VERSION; print(APP_VERSION)')" >> "$GITHUB_OUTPUT"
      - name: Build image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: centralpay-bridge:ci
          build-args: |
            APP_VERSION=${{ steps.appver.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Image smoke test (non-root, version, label, clean exit)
        run: |
          docker run --rm --entrypoint python centralpay-bridge:ci - <<'EOF'
          import os
          from app.version import APP_VERSION
          assert os.getuid() != 0, "container must not run as root"
          print("version:", APP_VERSION)
          EOF
          label=$(docker inspect -f '{{ index .Config.Labels "org.opencontainers.image.version" }}' centralpay-bridge:ci)
          expected='${{ steps.appver.outputs.value }}'
          echo "image version label: '${label}' (expected '${expected}')"
          test "$label" = "$expected"
      - name: Validate Caddyfile template
        run: |
          sed -e 's/{{PAYMENT_DOMAIN}}/pay.example.com/' -e 's/{{TLS_EMAIL}}/ops@example.com/' \
            deploy/caddy/Caddyfile.template > /tmp/Caddyfile
          docker run --rm -v /tmp/Caddyfile:/etc/caddy/Caddyfile:ro caddy:2 \
            caddy validate --config /etc/caddy/Caddyfile

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    name: Dependency vulnerability scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit
        run: |
          pip install .
          pip install pip-audit
          pip-audit
